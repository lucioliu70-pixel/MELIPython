site_id: "MLM"
currency: "MXN"
api_base_url: "https://api.mercadolibre.com"
search_path_template: "/sites/{site_id}/search"
item_path_template: "/items/{item_id}"

default_limit_per_keyword: 200

request_timeout: 20
request_sleep_seconds: 1.2
max_retries: 3
retry_429_sleep_seconds: 60

database_path: "data/meli_market.db"
export_dir: "data/exports"
log_file: "logs/app.log"
